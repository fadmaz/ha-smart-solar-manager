title: Smart Solar Manager
views:
  - title: Solar Optimizer
    path: solar-optimizer
    icon: mdi:solar-power-variant
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            title: Smart Strategy
            content: >-
              **Mode:** {{ states('sensor.smart_solar_mode') }}

              **Reason:** {{ state_attr('sensor.smart_solar_mode', 'reason') }}

              **Next action:** {{ states('sensor.smart_solar_next_action') }}

              **Estimated hourly savings:** {{ states('sensor.smart_solar_estimated_savings_hour') }}
          - type: entities
            title: Core Signals
            entities:
              - entity: sensor.smart_solar_mode
              - entity: sensor.smart_solar_next_action
              - entity: sensor.smart_solar_estimated_savings_hour
              - entity: sensor.smart_solar_surplus
          - type: glance
            title: Input Snapshot
            entities:
              - entity: sensor.forecast_solar_estimated_energy_production_today
                name: Forecast Today
              - entity: sensor.forecast_solar_next_hour
                name: Forecast Next Hour
              - entity: sensor.battery_soc
                name: Battery SoC
              - entity: sensor.grid_import_power
                name: Grid Import
          - type: button
            name: Recompute Recommendation
            icon: mdi:refresh
            tap_action:
              action: call-service
              service: ha_smart_solar_manager.recompute_plan
              data: {}
          - type: button
            name: Execute Plan (Dry Run)
            icon: mdi:play
            tap_action:
              action: call-service
              service: ha_smart_solar_manager.execute_plan
              data:
                dry_run: true
